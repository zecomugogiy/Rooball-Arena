workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sports.broomball.arena

      vars:
        XCODE_PROJECT: "BroomballArena.xcodeproj"
        XCODE_SCHEME: "BroomballArena"

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
